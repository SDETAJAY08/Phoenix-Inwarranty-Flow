name : postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * *
    - cron: 00 14 * * *
jobs:
  run-postman-test:
    runs-on: ec2 github runner
    steps:
      - name: checkout the code
        uses: actions/checkout@v6.0.2
      - name: Install Nodejs and npm
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
      - name: Install newman and Html-extra globally
        run : | 
              npm install -g newman
              npm install -g newman-reporter-htmlextra

      - name: Run the Postamna Collection with Newman
        run : |
               newman run 'Inwarranty-flow Collection.postman_collection.json' \
               -e QA.postman_environment.json \
               - d testData.csv \
               -r cli,htmlextra \
               --reporter-htmlextra-export ./newman/index.html

      - name: Upload a Artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Send email Notifications
        if: always()
        uses: dawidd6/action-send-mail@v13
        with:
          server_address : smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME}}
          password: ${{secrets.EMAIL_PASSWORD}}
          subject: Phoenix Inwarranty API Test Execution
          to: anand.ajay0001@gmail.com
          from: ${{secrets.EMAIL_USERNAME}}
          body: |
                Hy, 
                PFA Report for the API run and the URL
                is: https://sdetajay08.github.io/Phoenix-Inwarranty-Flow/
          
          
         
      
                
      
      
          
         
        
      
    
    
